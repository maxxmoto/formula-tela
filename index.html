<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Формула Тела</title>
<meta name="theme-color" content="#8fbc8f">
<style>
:root {
    --sage: #8fbc8f; --sage-dark: #5a8a5a; --sage-light: #c1d5c1;
    --terracotta: #e2725a; --gold: #d4a843; --olive: #9a9e5a;
    --warm-white: #fffaf5; --warm-gray: #f5f0ea;
    --text-dark: #2c2826; --text-muted: #7a726e;
    --radius: 16px; --radius-sm: 10px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
    font-family: var(--font);
    background: radial-gradient(ellipse at 20% 0%, rgba(143,188,143,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(226,114,90,0.08) 0%, transparent 50%),
                var(--warm-white);
    color: var(--text-dark); line-height: 1.5;
}
.container { max-width: 800px; margin: 0 auto; padding: 0 16px; }
.page { display: none; }
.page.active { display: block; }

/* Welcome */
.welcome-page.active {
    display: flex; min-height: 100vh;
    align-items: center; justify-content: center;
    text-align: center; padding: 40px 20px;
}
.welcome-card { max-width: 420px; }
.welcome-card h1 {
    font-size: 2.4rem; font-weight: 800;
    background: linear-gradient(135deg, var(--text-dark), var(--sage-dark));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 16px;
}
.welcome-card p { color: var(--text-muted); margin-bottom: 32px; font-size: 1.05rem; line-height: 1.6; }

.btn {
    display: inline-block; padding: 14px 40px; border-radius: 50px;
    font-weight: 600; font-size: 1rem; cursor: pointer; border: none;
    background: linear-gradient(135deg, var(--sage), var(--sage-dark));
    color: white; box-shadow: 0 4px 15px rgba(143,188,143,0.3);
    transition: all 0.3s ease;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(143,188,143,0.4); }
.btn-sm { padding: 10px 24px; font-size: 0.9rem; }
.btn-full { width: 100%; }
.btn-outline { background: transparent; color: var(--sage-dark); border: 2px solid var(--sage-light); box-shadow: none; }
.btn-outline:hover { background: rgba(143,188,143,0.08); transform: none; box-shadow: none; }

/* Setup page */
.setup-page.active { display: flex; min-height: 100vh; align-items: center; padding: 40px 0; }
.setup-card {
    max-width: 500px; margin: 0 auto; padding: 40px;
    background: rgba(255,250,245,0.6);
    backdrop-filter: blur(16px); border-radius: var(--radius);
    border: 1px solid rgba(255,250,245,0.4);
    box-shadow: 0 8px 32px rgba(44,40,38,0.08);
}
.setup-card h1 { text-align: center; margin-bottom: 8px; }
.setup-card p { text-align: center; margin-bottom: 24px; color: var(--text-muted); }

.form-group { margin-bottom: 16px; }
.form-label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
.form-input {
    width: 100%; padding: 12px 14px; border: 2px solid rgba(143,188,143,0.15);
    border-radius: var(--radius-sm); font-size: 1rem; font-family: var(--font);
    background: rgba(255,250,245,0.8); color: var(--text-dark);
    transition: all 0.3s;
}
.form-input:focus { outline: none; border-color: var(--sage); box-shadow: 0 0 0 3px rgba(143,188,143,0.15); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
select.form-input { appearance: auto; }

/* Navbar */
.navbar {
    display: none;
    background: rgba(255,250,245,0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,250,245,0.8);
    padding: 12px 0;
    position: sticky; top: 0; z-index: 100;
}
.navbar .container { display: flex; justify-content: space-between; align-items: center; }
.nav-logo {
    font-weight: 800; font-size: 1.2rem; cursor: pointer;
    background: linear-gradient(135deg, var(--sage-dark), var(--sage));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.nav-links { display: flex; align-items: center; gap: 4px; }
.nav-link, .nav-btn-link {
    padding: 8px 14px; border-radius: 50px; font-weight: 600;
    color: var(--text-muted); font-size: 0.9rem; cursor: pointer;
    transition: all 0.3s; background: none; border: none;
    font-family: var(--font);
}
.nav-link:hover { color: var(--text-dark); background: rgba(143,188,143,0.1); }
.nav-toggle { display: none; background: none; border: none; font-size: 1.8rem; cursor: pointer; color: var(--sage-dark); }
@media (max-width: 700px) {
    .nav-toggle { display: block; }
    .nav-links { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0;
        background: rgba(255,250,245,0.97); padding: 12px 20px; gap: 2px; z-index: 99; }
    .nav-links.active { display: flex; }
    .nav-link, .nav-btn-link { padding: 12px 16px; }
}

/* Dashboard */
.dashboard-page { padding: 24px 0; }
.dash-header { margin-bottom: 24px; }
.dash-header h1 { font-size: 1.6rem; margin-bottom: 8px; }
.dash-header .msg {
    background: rgba(143,188,143,0.08); padding: 10px 16px;
    border-radius: var(--radius-sm); border-left: 3px solid var(--sage);
    font-weight: 500; font-size: 0.95rem;
}
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.dash-card {
    padding: 20px; border-radius: var(--radius);
    background: rgba(255,250,245,0.6);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,250,245,0.4);
    box-shadow: 0 8px 32px rgba(44,40,38,0.06);
}
.dash-card.today { grid-column: span 2; }
.dash-card h2 { font-size: 1.15rem; margin-bottom: 12px; }
.dash-card h3 { font-size: 1rem; margin-bottom: 8px; color: var(--text-dark); }
.card-link { cursor: pointer; }
.card-action { color: var(--sage-dark); font-weight: 600; font-size: 0.9rem; cursor: pointer; display: inline-block; margin-top: 8px; }
.log-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.log-item label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 2px; }
.log-item input, .log-item select { width: 100%; padding: 8px 10px; border: 2px solid rgba(143,188,143,0.12); border-radius: 8px; font-size: 0.9rem; background: rgba(255,250,245,0.8); }

/* Macro bars */
.progress-bar-wrap { height: 8px; background: rgba(143,188,143,0.08); border-radius: 4px; margin-bottom: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
.progress-fill.protein { background: linear-gradient(90deg, var(--terracotta), #d06050); }
.progress-fill.carbs { background: linear-gradient(90deg, var(--gold), #d4a843); }
.progress-fill.fats { background: linear-gradient(90deg, var(--olive), #7a7e4a); }

.streak-grid { display: flex; gap: 6px; }
.day-m { width: 32px; height: 32px; border-radius: 50%; background: rgba(143,188,143,0.1); }
.day-m.active { background: linear-gradient(135deg, var(--sage), var(--sage-dark)); }

.empty-state { text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.9rem; }

@media (max-width: 600px) {
    .dash-grid { grid-template-columns: 1fr; }
    .dash-card.today { grid-column: span 1; }
    .log-row { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .setup-card { padding: 24px 16px; }
    .welcome-card h1 { font-size: 1.8rem; }
}
</style>
</head>
<body>

<div class="navbar" id="navBar">
    <div class="container">
        <div class="nav-logo" onclick="go('dashboard')">Формула Тела</div>
        <div class="nav-links" id="navLinks">
            <button class="nav-link" onclick="go('dashboard')">Дашборд</button>
            <button class="nav-link" onclick="go('setup')">Профиль</button>
        </div>
        <button class="nav-toggle" onclick="document.getElementById('navLinks').classList.toggle('active')">☰</button>
    </div>
</div>

<!-- WELCOME -->
<div class="page welcome-page active" data-page="welcome">
    <div class="welcome-card">
        <h1>Формула Тела</h1>
        <p>Персональный тренер и диетолог под ваши цели. Всё локально, без серверов.</p>
        <button class="btn" onclick="go('setup')">Начать</button>
    </div>
</div>

<!-- SETUP -->
<div class="page setup-page" data-page="setup">
    <div class="container">
        <div class="setup-card">
            <h1>Мои параметры</h1>
            <p>Заполните один раз</p>
            <form id="setupForm">
                <div class="form-group">
                    <label class="form-label">Имя</label>
                    <input type="text" id="sName" class="form-input" placeholder="Анна">
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Пол</label><select id="sGender" class="form-input"><option value="female">Женский</option><option value="male">Мужской</option></select></div>
                    <div class="form-group"><label class="form-label">Возраст</label><input type="number" id="sAge" class="form-input" value="30"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Рост (см)</label><input type="number" id="sHeight" class="form-input" value="170"></div>
                    <div class="form-group"><label class="form-label">Вес (кг)</label><input type="number" id="sWeight" class="form-input" value="70"></div>
                </div>
                <button type="submit" class="btn btn-full">Сохранить</button>
            </form>
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div class="page dashboard-page" data-page="dashboard">
    <div class="container">
        <div class="dash-header">
            <h1 id="dashGreeting">Привет!</h1>
            <div class="msg" id="dashMsg">Сегодня идеальный день для заботы о себе!</div>
        </div>
        <div class="dash-grid">
            <div class="dash-card today">
                <h2>Быстрый лог</h2>
                <form id="logForm">
                    <div class="log-row">
                        <div class="log-item"><label>💧 Вода</label><input type="number" id="logWater" value="0" min="0"></div>
                        <div class="log-item"><label>🌙 Сон</label><input type="number" id="logSleep" step="0.5" value="0" min="0"></div>
                        <div class="log-item"><label>🏃 Активность</label><input type="number" id="logActivity" value="0" min="0"></div>
                    </div>
                    <button class="btn btn-sm btn-outline">Сохранить</button>
                </form>
            </div>
            <div class="dash-card">
                <h2>🍎 Питание</h2>
                <div style="font-size:0.9rem;margin-bottom:8px;">
                    <div style="display:flex;justify-content:space-between;"><span>Белки</span><span id="dPText">0г</span></div>
                    <div class="progress-bar-wrap"><div class="progress-fill protein" id="dPBar" style="width:0%"></div></div>
                    <div style="display:flex;justify-content:space-between;"><span>Углеводы</span><span id="dCText">0г</span></div>
                    <div class="progress-bar-wrap"><div class="progress-fill carbs" id="dCBar" style="width:0%"></div></div>
                    <div style="display:flex;justify-content:space-between;"><span>Жиры</span><span id="dFText">0г</span></div>
                    <div class="progress-bar-wrap"><div class="progress-fill fats" id="dFBar" style="width:0%"></div></div>
                </div>
            </div>
            <div class="dash-card">
                <h2>🔥 Серия</h2>
                <div class="streak-grid" id="streakGrid"></div>
            </div>
        </div>
    </div>
</div>

<script>
// ===== Storage =====
const S = {
    get(k, d) { try { const v = localStorage.getItem('ft_' + k); return v ? JSON.parse(v) : d } catch { return d } },
    set(k, v) { localStorage.setItem('ft_' + k, JSON.stringify(v)) }
};

// ===== Navigation =====
function go(page) {
    history.pushState(null, '', '#' + page);
    show(page);
}

function show(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const el = document.querySelector(`[data-page="${page}"]`);
    if (el) el.classList.add('active');
    const nav = document.getElementById('navBar');
    if (nav) nav.style.display = (page === 'setup' || page === 'welcome') ? 'none' : 'flex';
    document.getElementById('navLinks')?.classList.remove('active');
    if (page === 'dashboard') renderDash();
    if (page === 'setup') renderSetup();
    window.scrollTo(0, 0);
}

window.addEventListener('popstate', () => {
    const h = location.hash.slice(1) || 'welcome';
    show(h);
});

// ===== Render Setup =====
function renderSetup() {
    const p = S.get('profile');
    const $ = id => document.getElementById(id);
    if (p) {
        if ($('sName')) $('sName').value = p.name || '';
        if ($('sGender')) $('sGender').value = p.gender || 'female';
        if ($('sAge')) $('sAge').value = p.age || 30;
        if ($('sHeight')) $('sHeight').value = p.height || 170;
        if ($('sWeight')) $('sWeight').value = p.current_weight || 70;
    }
    const f = $('setupForm');
    if (f) f.onsubmit = function(e) {
        e.preventDefault();
        S.set('profile', {
            name: ($('sName')?.value || '').trim() || 'Друг',
            gender: $('sGender')?.value || 'female',
            age: parseInt($('sAge')?.value) || 30,
            height: parseFloat($('sHeight')?.value) || 170,
            current_weight: parseFloat($('sWeight')?.value) || 70,
        });
        go('dashboard');
    };
}

// ===== Render Dashboard =====
function renderDash() {
    const p = S.get('profile');
    const t = new Date().toISOString().slice(0, 10);
    const $ = id => document.getElementById(id);
    const name = p?.name || '';
    if ($('dashGreeting')) $('dashGreeting').textContent = name ? 'Привет, ' + name + '!' : 'Привет!';
    if ($('dashMsg')) $('dashMsg').textContent = 'Сегодня идеальный день для заботы о себе!';

    const logs = S.get('logs', []);
    let log = logs.find(l => l.date === t);
    if (!log) log = { date: t, water: 0, sleep: 0, activity: 0 };

    if ($('logWater')) $('logWater').value = log.water || 0;
    if ($('logSleep')) $('logSleep').value = log.sleep || '';
    if ($('logActivity')) $('logActivity').value = log.activity || 0;

    const f = $('logForm');
    if (f) f.onsubmit = function(e) {
        e.preventDefault();
        const l = {
            date: t,
            water: parseInt($('logWater')?.value) || 0,
            sleep: parseFloat($('logSleep')?.value) || 0,
            activity: parseInt($('logActivity')?.value) || 0
        };
        const idx = logs.findIndex(x => x.date === t);
        if (idx >= 0) logs[idx] = l; else logs.push(l);
        S.set('logs', logs);
    };

    if ($('dPText')) $('dPText').textContent = '0г / 80г';
    if ($('dCText')) $('dCText').textContent = '0г / 200г';
    if ($('dFText')) $('dFText').textContent = '0г / 60г';

    const streak = logs.filter(l => (l.activity || 0) >= 15).length;
    if ($('streakGrid')) {
        $('streakGrid').innerHTML = '';
        for (let i = 0; i < 7; i++) {
            const d = document.createElement('div');
            d.className = 'day-m' + (i < Math.min(streak, 7) ? ' active' : '');
            $('streakGrid').appendChild(d);
        }
    }
}

// ===== Init =====
document.addEventListener('DOMContentLoaded', function() {
    const hash = location.hash.slice(1) || 'welcome';
    const profile = S.get('profile');
    if (profile && (hash === 'welcome' || hash === 'setup')) go('dashboard');
    else go(hash);
});
</script>
</body>
</html>
